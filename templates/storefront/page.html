{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{{ page_title }} | SEQUENZ</title>
  <link rel="stylesheet" href="{% static 'storefront/store.css' %}">
</head>
<body class="content-page" data-page="{{ page_kind }}"{% if view.kwargs.order_number %} data-order-number="{{ view.kwargs.order_number }}"{% endif %}{% if view.kwargs.content_type %} data-content-type="{{ view.kwargs.content_type }}" data-content-slug="{{ view.kwargs.slug }}"{% endif %}>
  <header class="topbar">
    <button class="icon-button menu-trigger" id="menuButton" aria-label="전체 메뉴">MENU</button>
    <a class="logo" href="/">SEQUENZ</a>
    <div class="top-actions"><a class="icon-button" href="/account/">MY</a><a class="icon-button cart-button" href="/cart/">BAG <span id="pageCartCount">0</span></a></div>
  </header>
  {% include "storefront/_sidebar.html" %}
  <main class="page-main">
    <nav class="page-breadcrumb" aria-label="현재 위치"><a href="/">HOME</a><span>/</span><span>{{ page_title }}</span></nav>
    <header class="page-heading"><p class="eyebrow">SEQUENZ</p><h1>{{ page_title }}</h1></header>
    <div id="pageContent" class="page-content" aria-live="polite"><p class="page-loading">불러오는 중입니다.</p></div>
  </main>
  <nav class="bottom-nav" aria-label="주요 메뉴">
    <a href="/">HOME</a><a href="/#products">SHOP</a><a href="/support/">HELP</a><a href="/cart/">BAG</a><a href="/account/">MY</a>
  </nav>
  <div id="toast" class="toast" role="status"></div>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <script src="{% static 'storefront/navigation.js' %}" defer></script>
  <script src="{% static 'storefront/page.js' %}" defer></script>
</body>
</html>
