{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="icon" href="{% static 'storefront/favicon.svg' %}" type="image/svg+xml">
  <title>SEQUENZ</title>
  <link rel="stylesheet" href="{% static 'storefront/store.css' %}">
</head>
<body class="storefront-page">
  <a class="skip-link" href="#mainContent">본문 바로가기</a>
  <header class="topbar">
    <button class="icon-button menu-trigger" id="menuButton" aria-label="전체 메뉴" aria-expanded="false" aria-controls="siteSidebar">MENU</button>
    <a class="logo" href="/">SEQUENZ</a>
    <div class="top-actions"><a class="icon-button" href="/account/" aria-label="회원 메뉴">MY</a><a class="icon-button cart-button" href="/cart/" aria-label="장바구니">BAG <span id="cartCount">0</span></a></div>
  </header>
  {% include "storefront/_sidebar.html" %}

  <main id="mainContent" class="storefront-main">
    <div class="hero-stack" id="heroBanners" aria-label="주요 배너">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">CURATED EVERYDAY</p>
          <h1>지금의 감각을<br>입는 방식.</h1>
          <p>선별된 브랜드와 매일 입고 싶은 옷을 만나보세요.</p>
          <a href="#products" class="hero-link">SHOP THE EDIT →</a>
        </div>
      </section>
    </div>

    <section class="filters" aria-label="상품 필터">
      <div id="brands" class="chips"></div>
      <div id="attributeFilters" class="attribute-filters"></div>
      <div class="commerce-filters">
        <label>최소 가격<input id="minPriceFilter" type="number" min="0" step="1000" placeholder="0"></label>
        <label>최대 가격<input id="maxPriceFilter" type="number" min="0" step="1000" placeholder="제한 없음"></label>
        <label class="stock-filter"><input id="inStockFilter" type="checkbox"> 품절 제외</label>
      </div>
      <div id="searchKeywords" class="chips search-keywords"></div>
      <div id="recentKeywords" class="chips recent-keywords"></div>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="상품, 브랜드 검색" aria-label="상품 검색">
        <select id="sortSelect" aria-label="정렬">
          <option value="recommended">추천순</option>
          <option value="newest">신상품순</option>
          <option value="price_asc">낮은 가격순</option>
          <option value="price_desc">높은 가격순</option>
          <option value="popular">인기순</option>
          <option value="reviews">리뷰순</option>
          <option value="views">조회순</option>
        </select>
      </div>
    </section>

    <section id="products" class="product-section">
      <div class="section-title"><h2>NEW ARRIVALS</h2><span id="resultCount"></span></div>
      <div id="productGrid" class="product-grid" aria-live="polite"></div>
      <button id="loadMoreButton" class="load-more" hidden>더 보기</button>
    </section>
    <section id="collectionSections" class="collection-sections"></section>
  </main>
  {% include "storefront/_footer.html" %}

  <nav class="bottom-nav" aria-label="주요 메뉴">
    <a href="/" aria-current="page">홈</a><a href="/account/#wishlist">찜</a><a href="/account/#recent">히스토리</a><a href="/cart/">장바구니</a><a href="/account/">MY</a>
  </nav>
  <div id="toast" class="toast" role="status"></div>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <script src="https://t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js" defer></script>
  <script src="{% static 'storefront/navigation.js' %}" defer></script>
  <script src="{% static 'storefront/postcode.js' %}" defer></script>
  <script src="{% static 'storefront/store.js' %}" defer></script>
</body>
</html>
